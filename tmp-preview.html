<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Modern Calculator</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"><style>body { font-family: 'Inter', sans-serif; }</style></head><body class="bg-gray-900 flex items-center justify-center min-h-screen"><div class="bg-gray-800 p-6 rounded-xl shadow-2xl w-96"><div class="text-right text-white text-3xl mb-4 h-16 flex items-end justify-end overflow-hidden" id="display">0</div><div class="grid grid-cols-4 gap-3"><button class="calculator-btn bg-gray-700 hover:bg-gray-600 text-white text-xl p-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" data-value="C">C</button><button class="calculator-btn bg-gray-700 hover:bg-gray-600 text-white text-xl p-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" data-value="neg">+/-</button><button class="calculator-btn bg-gray-700 hover:bg-gray-600 text-white text-xl p-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" data-value="%">%</button><button class="calculator-btn bg-blue-600 hover:bg-blue-700 text-white text-xl p-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" data-value="/">÷</button><button class="calculator-btn bg-gray-700 hover:bg-gray-600 text-white text-xl p-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" data-value="7">7</button><button class="calculator-btn bg-gray-700 hover:bg-gray-600 text-white text-xl p-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" data-value="8">8</button><button class="calculator-btn bg-gray-700 hover:bg-gray-600 text-white text-xl p-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" data-value="9">9</button><button class="calculator-btn bg-blue-600 hover:bg-blue-700 text-white text-xl p-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" data-value="*">×</button><button class="calculator-btn bg-gray-700 hover:bg-gray-600 text-white text-xl p-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" data-value="4">4</button><button class="calculator-btn bg-gray-700 hover:bg-gray-600 text-white text-xl p-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" data-value="5">5</button><button class="calculator-btn bg-gray-700 hover:bg-gray-600 text-white text-xl p-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" data-value="6">6</button><button class="calculator-btn bg-blue-600 hover:bg-blue-700 text-white text-xl p-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" data-value="-">—</button><button class="calculator-btn bg-gray-700 hover:bg-gray-600 text-white text-xl p-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" data-value="1">1</button><button class="calculator-btn bg-gray-700 hover:bg-gray-600 text-white text-xl p-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" data-value="2">2</button><button class="calculator-btn bg-gray-700 hover:bg-gray-600 text-white text-xl p-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" data-value="3">3</button><button class="calculator-btn bg-blue-600 hover:bg-blue-700 text-white text-xl p-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" data-value="+">+</button><button class="calculator-btn bg-gray-700 hover:bg-gray-600 text-white text-xl p-4 rounded-lg col-span-2 focus:outline-none focus:ring-2 focus:ring-blue-500" data-value="0">0</button><button class="calculator-btn bg-gray-700 hover:bg-gray-600 text-white text-xl p-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" data-value=".">.</button><button class="calculator-btn bg-green-600 hover:bg-green-700 text-white text-xl p-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" data-value="=">=</button></div></div><script>const display = document.getElementById('display');const buttons = document.querySelectorAll('.calculator-btn');let currentInput = '0';let operator = null;let previousInput = null;function updateDisplay() {display.textContent = currentInput;}function clearAll() {currentInput = '0';operator = null;previousInput = null;updateDisplay();}function appendNumber(number) {if (currentInput === '0' || currentInput === '-0') {currentInput = number;} else {currentInput += number;}updateDisplay();}function chooseOperator(op) {if (currentInput === '0' && previousInput === null && op !== '-') {return;}if (previousInput !== null && operator !== null) {calculateResult();}previousInput = currentInput;operator = op;currentInput = '0';}function calculateResult() {let result;const prev = parseFloat(previousInput);const current = parseFloat(currentInput);if (isNaN(prev) || isNaN(current)) return;switch (operator) {case '+':result = prev + current;break;case '-':result = prev - current;break;case '*':result = prev * current;break;case '/':result = prev / current;break;case '%':result = prev % current;break;default:return;}currentInput = result.toString();operator = null;previousInput = null;updateDisplay();}buttons.forEach(button => {button.addEventListener('click', () => {const value = button.dataset.value;if (!isNaN(value)) {appendNumber(value);} else if (value === '.') {if (!currentInput.includes('.')) {currentInput += '.';}updateDisplay();} else if (value === 'C') {clearAll();} else if (value === 'neg') {currentInput = (parseFloat(currentInput) * -1).toString();updateDisplay();} else if (value === '=') {calculateResult();} else {chooseOperator(value);}});});updateDisplay();</script></body></html>
